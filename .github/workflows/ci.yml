name: GitHub Actions Demo

# Triggers the workflow on a push event to any branch
on: [push]

# Allows you to run this workflow manually from the Actions tab
workflow_dispatch:

jobs:
  my-first-job:
    # This line tells GitHub to provision an Ubuntu Linux runner
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Run a one-line script
        run: echo "Hello World! This job is running on Ubuntu."