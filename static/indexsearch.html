<!-- search Text File() -->
     <script>
        async function searchTextFile() {
            const query = document.getElementById('searchQuery').value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "Searching...";
            
            const regex = new RegExp('PIN:[0-9]+.?[0-9]+', 'gi');
            var coloredLine; // = line.replace(regex, '<span style="color: red;">$1</span>');

            try {
                // 1. Fetch the static text file from your server
                const response = await fetch('searchme.csv');
                const text = await response.text();

                // 2. Split the file into lines or paragraphs
                const lines = text.split('\n');
                
                // 3. Filter lines that contain the keyword
                const matches = lines.filter(line => line.toLowerCase().includes(query));

                // 4. Render results to the user
                if (matches.length > 0) {
                resultsDiv.innerHTML = `<h3>Found ${matches.length} matches:</h3><ul>` + 
                    matches.map(line => { const coloredLine = line.replace(regex, '<span style="color: red; font-weight: bold">$&</span>'); 
                    return `<li>${coloredLine}</li>` } ).join('') + `</ul>`;
                } else {
                resultsDiv.innerHTML = "No matches found.";
                }
            } catch (error) {
                resultsDiv.innerHTML = "Error loading text file.";
                console.error(error);
            }
        }
    </script>
    
<!-- keydown handler -->
     <script>
        document.getElementById('searchQuery').addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            // event.preventDefault(); // Stop default browser actions

            searchTextFile(); 
            }
        })
    </script>

<!-- schedule.csv search-->
    <script>
    document.getElementById('csvFileInput').addEventListener('change', (event) => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);  
        
        const file = event.target.files[0]; 
        // console.log(file);
        if (!file) return;

        Papa.parse(file, {
        // YEAR    MONTH    DAY   MESSAGE   CRITICAL  
        // download: true
        header: true,         // Converts rows into JSON objects using the first row as keys
        skipEmptyLines: true, // Ignores blank lines at the end of the file
        delimiter: ",",
        complete: function(results) {
            // const query = document.getElementById('searchQuery').value.toLowerCase();
            const ulCsv = document.getElementById('ul-csv');
            
            console.log("Parsed JSON Data:", results.data);
            console.log("Errors encountered:", results.errors);

            ulCsv.innerHTML = results.data
            
                    // JavaScript months are 0-indexed (Jan is 0, Feb is 1). 
            // Subtract 1 if your CSV data uses 1 for January.

            .filter(row => {

                const rowDate = new Date(row.YEAR, row.MONTH - 1, row.DAY);
                return rowDate >= today;

            })
            
            .map( row => `<li>${row.MONTH}\\${row.DAY}\\${row.YEAR}: ${row.MESSAGE} ${row.CRITICAL ? '<span style="color: red; font-weight: bold;"> *CRITICAL* </span>' : ''}</li>` ).join('')
        }
        });
    });
    </script>
