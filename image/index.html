<!DOCTYPE html>
<html>
<head>
  <title>My IMAGE List</title>
  
  <style>
    img                             { max-width: 100%;  height: auto;  display: block; } /* The Standard CSS Fluid Image (Universal Default) */
    /* li::marker                   { content: "✅ ";   } */
    a:link                          { color: #1a73e8; } /* Default blue for unvisited links */
    a:visited                       { color: #1a73e8; } /* Force visited links to share the same unvisited color */
    a[data-value]:hover             { text-decoration: none; }                                                         /* a[data-value]:hover        is only valid when the data-* attribute exists */
    a[data-value]:hover::after      { content:  "           " attr(data-value); font-weight: bold; color:crimson; }  /* a[data-value]:hover::after is only valid when the data-* attribute exists */
    /* input[type="file"]  { direction: rtl} */
  </style>
  
</head>
<body>
  <h1>IMAGES</h1>
  <ul>
     <li><a href="https://keithibrown.org/image"><img src="/image/bee.jpg" alt="Bee in Flight" ></a></li><br>
     <li><a href="https://keithibrown.org/image"><img src="/image/hvac schedule.jpg" alt="HVAC Schedule" ></a></li><br>
     
     <!-- 
     <li><a href="https://keithibrown.org/image"><img src="/image/bee.jpg" alt="Bee in Flight" width="300" height="200"></a></li><br>
     <li><a href="https://keithibrown.org/image"><img src="/image/hvac schedule.jpg" alt="HVAC Schedule" width="900" height="600"></a></li><br>
     -->
  </ul>
</body>
</html>
